name: Weekly ML Data Pipeline

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday 2AM UTC
  workflow_dispatch:       # Manual trigger for testing

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache pip dependencies (~900MB torch + sentence-transformers)
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ml-${{ hashFiles('backend/requirements-ml.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-ml-

      # Cache Whisper model (~139MB)
      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/whisper
          key: whisper-base-v1

      # Cache HuggingFace sentence-transformers model (~90MB)
      - name: Cache HF model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2-v1

      # Install ffmpeg for Whisper audio processing
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Install Python dependencies
      - name: Install dependencies
        run: pip install -r backend/requirements-ml.txt

      # ====== PIPELINE STEP 1: Expand artist pool ======
      - name: 🎤 Expand artist pool
        working-directory: backend
        env:
          GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: python -m ml.pipeline_expand_artists
        continue-on-error: true  # Don't fail entire pipeline if Genius is down

      # ====== PIPELINE STEP 2: Track trending songs ======
      - name: 📈 Track trending songs
        working-directory: backend
        run: python -m ml.pipeline_trending
        continue-on-error: true

      # ====== PIPELINE STEP 3: Re-compute BERT embeddings ======
      - name: 🧠 Compute lyrics embeddings
        working-directory: backend
        env:
          TOKENIZERS_PARALLELISM: 'false'
        run: python -m ml.compute_lyrics_embeddings

      # ====== PIPELINE STEP 4: Re-train downstream embedding engines ======
      # The lyrics corpus can grow (new artists), so every engine keyed to the
      # same index must be rebuilt — otherwise qwen3/vae/ncf/contrastive/graph
      # indexes silently drift out of alignment with lyrics_index.json.
      - name: 🔁 Re-train downstream engines
        working-directory: backend
        env:
          TOKENIZERS_PARALLELISM: 'false'
        run: |
          python -m ml.compute_qwen3_embeddings
          python -m ml.train_vae
          python -m ml.train_ncf
          python -m ml.train_contrastive
          python -m ml.compute_graph_embeddings
          python -m ml.build_knowledge_graph
        continue-on-error: true

      # ====== PIPELINE STEP 5: Whisper sync new songs ======
      - name: 🎙️ Whisper lyrics sync
        working-directory: backend
        run: python -m ml.sync_lyrics_whisper
        timeout-minutes: 40
        continue-on-error: true  # New songs might not have previews

      # ====== PIPELINE STEP 6: CLAP audio engine (best-effort) ======
      # Heavy: downloads 30s previews then runs CLAP inference. continue-on-error
      # so a timeout/rate-limit keeps the last committed audio embeddings instead
      # of failing the run. Previews are gitignored; only the .npy is committed.
      - name: 🔊 CLAP audio embeddings
        working-directory: backend
        run: |
          python -m ml.download_previews
          python -m ml.compute_audio_embeddings
        timeout-minutes: 45
        continue-on-error: true

      # ====== PIPELINE STEP 7: Re-compute insights ======
      - name: 📊 Update insights
        working-directory: backend
        run: python -m app.compute_insights

      # ====== PIPELINE STEP 6: Commit and push ======
      - name: 📦 Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all ML data files
          git add backend/ml_data/
          git add backend/app/taylor_complete.json || true

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            ARTIST_COUNT=$(python3 -c "import json; d=json.load(open('backend/ml_data/cross_artist_lyrics.json')); print(len(set(s['artist'] for s in d)))" 2>/dev/null || echo "?")
            SONG_COUNT=$(python3 -c "import json; d=json.load(open('backend/ml_data/cross_artist_lyrics.json')); print(len(d))" 2>/dev/null || echo "?")

            git commit -m "📡 Weekly data update: $(date -u +%Y-%m-%d)

          Automated pipeline run:
          - Cross-artist corpus: ${SONG_COUNT} songs from ${ARTIST_COUNT} artists
          - BERT embeddings re-computed
          - Whisper timings updated
          - Trending snapshot captured
          - Insights refreshed"

            git push
            echo "✅ Data committed and pushed"
          fi
